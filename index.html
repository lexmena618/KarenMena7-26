<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey Karen 💜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1 id="main-title">Hey Karen, will you go out with me May 23rd? 🥺</h1>

        <div class="gif-container">
            <img id="main-gif" src="https://media1.tenor.com/m/_yOoMlrZ-4MAAAAd/happy-birthday.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes! 💜</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
    </div>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🎵 Play Music</button>

    <script src="script.js"></script>
</body>
</html>
